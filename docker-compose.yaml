# A named network with a fixed subnet is only needed so external
# tooling (our pyads sidecar in tests/CI, or a second PLC container
# on a specific IP) can pin itself predictably on the same broadcast
# domain. The TwinCAT runtime + broker themselves only need hostname
# resolution (Docker DNS handles that automatically), so no
# ipv4_address is assigned to their services.
#
# On a real Beckhoff IPC with RT-Ethernet + direct AMS-TCP routing
# the fixed-IP style from the upstream sample is still advisable —
# keep that behaviour for RT deployments.
networks:
  container-network:
    name: container-network
    ipam:
      driver: default
      config:
        - subnet: 192.168.20.0/24
          gateway: 192.168.20.1

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    hostname: mosquitto
    ports:
      - "1883:1883"
    restart: unless-stopped
    volumes:
      - ./simple-mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - container-network

  tc31-xar-base:
    image: tc31-xar-base:latest
    container_name: tc31-xar-base
    hostname: tc31-xar-base
    restart: unless-stopped
    depends_on:
      - mosquitto
    privileged: true
    volumes:
      - /dev/hugepages:/dev/hugepages:rw
      # Optional: expose the runtime's /var/log so TwinCAT syslog()
      # output + other log files can be inspected and archived from
      # outside the container. Use either a named volume or a
      # host-side bind mount:
      #   - tc-logs:/var/log
      #   - ./logs:/var/log
    networks:
      - container-network
    # Use PCI_DEVICES as environment variables to specify the Ethernet
    # controllers which can be used by the TwinCAT runtime for real-time
    # ethernet communication.
    # If PCI_DEVICES is not provided at all, TwinCAT will probe all
    # available Ethernet controllers of the host for real-time ethernet communication.
    # If PCI_DEVICES is set to NONE, the TwinCAT runtime won't use probe
    # any PCI Ethernet controller for real-time ethernet communicaion.
    # Set PCI_DEVICES to a space seperated list of PCI slot address
    # to explicitly set Ethernet controllers for real-time ethernet communication.
    # Run `sudo TcRteInstall -l` on the host to get a list of available
    # Ethernet controllers and their PCI slot address
    # Examples:
    #  #- PCI_DEVICES=NONE
    #  - PCI_DEVICES=NONE
    #  - PCI_DEVICES=0000:02:00.0
    #  - PCI_DEVICES=0000:04:00.0 0000:03:00.0
    environment:
      #- PCI_DEVICES=NONE
      - AMS_NETID=15.15.15.15.1.1
      # Optional: override the MQTT route written to StaticRoutes.xml on
      # every boot. Defaults: mosquitto / 1883 / AdsOverMqtt.
      # When multiple PLC containers share one broker, give each its
      # own MQTT_TOPIC (e.g. AdsOverMqtt_plcA, AdsOverMqtt_plcB) so
      # Engineering discovery stays separated.
      #- MQTT_BROKER_HOST=mosquitto
      #- MQTT_BROKER_PORT=1883
      #- MQTT_TOPIC=AdsOverMqtt
      # Set TC_STATIC_ROUTES_MANAGED=0 AND mount your own file at
      # /etc/TwinCAT/3.1/Target/StaticRoutes.xml if you want full
      # control over the routes file.
      #- TC_STATIC_ROUTES_MANAGED=0
