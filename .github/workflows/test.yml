name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run unit tests
        run: pytest tests/unit -v

  unit-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run unit tests
        run: pytest tests/unit -v

  e2e-linux:
    # Runs on a Linux runner with Docker preinstalled. Requires the repo
    # secret BHF_APT_CONF to contain a valid netrc-style bhf.conf for the
    # Beckhoff apt mirror. Builds all three image tiers and exercises the
    # fully bundled PLC runtime (:licensed) end-to-end.
    runs-on: ubuntu-latest
    needs: unit-linux
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Allocate hugepages for the TwinCAT runtime
        run: |
          sudo sysctl vm.nr_hugepages=1024
          grep -E '^HugePages_(Total|Free)' /proc/meminfo
      - name: Inject Beckhoff apt credentials
        env:
          BHF_APT_CONF: ${{ secrets.BHF_APT_CONF }}
        run: |
          if [ -z "$BHF_APT_CONF" ]; then
            echo "::error::BHF_APT_CONF secret not set — e2e job cannot build the XAR image"
            exit 1
          fi
          printf '%s\n' "$BHF_APT_CONF" > tc31-xar-base/apt-config/bhf.conf
      - name: Build tc31-xar-base:latest
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --secret id=apt,src=./tc31-xar-base/apt-config/bhf.conf \
            --network host \
            -t tc31-xar-base:latest \
            -f ./tc31-xar-base/Dockerfile \
            ./tc31-xar-base
      - name: Build tc31-xar-base:faketime
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --secret id=apt,src=./tc31-xar-base/apt-config/bhf.conf \
            --network host \
            -t tc31-xar-base:faketime \
            -f ./tc31-xar-base/Dockerfile.faketime \
            ./tc31-xar-base
      - name: Build tc31-xar-base:licensed
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --secret id=apt,src=./tc31-xar-base/apt-config/bhf.conf \
            --network host \
            -t tc31-xar-base:licensed \
            -f ./tc31-xar-base/Dockerfile.licensed \
            ./tc31-xar-base
      - name: Bring up test stack (base image)
        run: docker compose -f docker-compose.yaml -f docker-compose.test.yaml up -d
      - name: Wait for broker + ADS port
        run: |
          for i in $(seq 1 60); do
            docker compose -f docker-compose.yaml -f docker-compose.test.yaml exec -T tc31-xar-base sh -c 'ss -tlnp 2>/dev/null | grep -q :48898' && break || true
            sleep 1
          done
      - name: Run base e2e tests (sidecar inside container-network)
        run: |
          docker run --rm --network container-network --ip 192.168.20.100 \
            -v "$PWD:/work:z" -w /work \
            -e STACK_ALREADY_UP=1 -e MQTT_HOST=mosquitto \
            -e ADS_HOST=tc31-xar-base -e ADS_AMS_NETID=15.15.15.15.1.1 \
            -e LOCAL_AMS_NETID=1.1.1.1.1.1 \
            python:3.12-slim bash -c \
              "pip install --quiet pytest pyads paho-mqtt pyyaml lxml && \
               pytest tests/e2e -v --deselect tests/e2e/test_plc_runtime.py"
      - name: Tear down base stack
        if: always()
        run: docker compose -f docker-compose.yaml -f docker-compose.test.yaml down -v
      - name: Bring up licensed stack
        run: docker compose -f docker-compose.yaml -f docker-compose.test.yaml -f docker-compose.licensed.yaml up -d
      - name: Wait for licensed ADS + PLC ports (up to 60s)
        run: |
          for i in $(seq 1 60); do
            plc_bound=$(docker exec tc31-xar-base sh -c 'cat /proc/net/tcp6 2>/dev/null | grep -c BF02' || echo 0)
            # additional sanity: check both PLC app ports bind inside container
            plc_851=$(docker exec tc31-xar-base sh -c 'cat /proc/net/tcp 2>/dev/null' | grep -c ':0353' || echo 0)
            if [ "$plc_bound" -ge 1 ]; then
              echo "ADS port bound after ${i}s (PLC internal listeners=$plc_851)"
              break
            fi
            sleep 1
          done
          echo "--- tc31-xar-base log snapshot ---"
          docker logs tc31-xar-base 2>&1 | tail -40
      - name: Run PLC e2e tests (bundled licensed image, sidecar)
        run: |
          docker run --rm --network container-network --ip 192.168.20.100 \
            -v "$PWD:/work:z" -w /work \
            -e STACK_ALREADY_UP=1 -e USE_LICENSED_IMAGE=1 -e MQTT_HOST=mosquitto \
            -e ADS_HOST=tc31-xar-base -e ADS_AMS_NETID=15.15.15.15.1.1 \
            -e LOCAL_AMS_NETID=1.1.1.1.1.1 \
            python:3.12-slim bash -c \
              "pip install --quiet pytest pyads paho-mqtt pyyaml lxml && \
               pytest tests/e2e/test_plc_runtime.py -v"
      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "--- tc31-xar-base ---"; docker logs tc31-xar-base || true
          echo "--- mosquitto ---"; docker logs mosquitto || true

  # NOTE: e2e-windows is intentionally omitted. Docker Desktop on
  # windows-latest runners is unavailable (requires interactive license
  # acceptance). Run tests/e2e locally on a Windows dev host.
