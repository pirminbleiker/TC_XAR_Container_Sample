# Overlay that pins the container clock inside a known license window
# and persists the Engineering-activated license + PLC boot project in
# named volumes. libfaketime ships in the base image; the entrypoint
# activates it only when FAKETIME is present in the environment.
#
# Use alongside the base + test overlays:
#   docker compose \
#     -f docker-compose.yaml \
#     -f docker-compose.test.yaml \
#     -f docker-compose.faketime.yaml \
#     up -d
#
# Override the default via host env:
#   FAKETIME='@2026-05-01 12:00:00' docker compose ... up -d
services:
  tc31-xar-base:
    environment:
      - AMS_NETID=15.15.15.15.1.1
      - PCI_DEVICES=NONE
      # @ prefix freezes the clock (does not advance). Without @ the
      # clock advances from the given anchor at real wall-clock speed.
      - FAKETIME=${FAKETIME:-@2026-04-15 12:00:00}
    volumes:
      - tc-license:/etc/TwinCAT/3.1/Target/License
      - tc-boot:/etc/TwinCAT/3.1/Boot

volumes:
  tc-license:
  tc-boot:
